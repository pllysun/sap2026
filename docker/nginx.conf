worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /app/logs/nginx-access.log main;
    error_log  /app/logs/nginx-error.log warn;

    # ===== HTTP Server =====
    server {
        listen 80;
        server_name _;

        # 安全响应头
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Let's Encrypt ACME 验证
        location /.well-known/acme-challenge/ {
            root /app/ssl/webroot;
        }

        # /admin 精确匹配 → 301 重定向到 /admin/
        location = /admin {
            return 301 /admin/;
        }

        # 屏蔽 API 文档与调试端点
        location ~ ^/api/(doc\.html|swagger-ui|v3/api-docs|webjars|swagger-resources) {
            return 404;
        }

        # ===== 用户端 SPA =====
        location / {
            root /app/static/user;
            index index.html;
            try_files $uri $uri/ /index.html;

            # 静态资源缓存（Vite 打包后带 hash）
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ===== 管理端 SPA =====
        location /admin/ {
            alias /app/static/admin/;
            index index.html;
            try_files $uri $uri/ /admin/index.html;

            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ===== API 反向代理 =====
        location /api/ {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 文件上传限制（与后端 Spring 单文件 50MB 上限保持一致）
            client_max_body_size 50M;
        }
    }

    # ===== HTTPS Server (仅在有 SSL 证书时启用) =====
    # SSL_INCLUDE_MARKER
}
