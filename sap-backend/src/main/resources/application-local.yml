# ============================
# 本地联调环境（H2 内置库，不连任何真实数据库）
# 启动：mvn spring-boot:run 时加 -Dspring-boot.run.profiles=local（需 JDK 21）
# 默认端口 8081，与 App 的 BASE_URL 一致
# ============================
spring:
  # 本地无 Redis：排除 sa-token redis 适配，登录态走内存（仅 docker/生产用 Redis 持久化）
  autoconfigure:
    exclude: cn.dev33.satoken.dao.SaTokenDaoRedisJackson
  datasource:
    url: jdbc:h2:file:/tmp/sap-h2/sapdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  h2:
    console:
      enabled: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  file:
    path: /tmp/sap-logs
