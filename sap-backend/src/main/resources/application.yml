# ============================
# 公共配置
# ============================
# 切换环境：修改 spring.profiles.active 的值
#   dev  = 开发环境（本地数据库）
#   prod = 生产环境（腾讯云数据库）

server:
  port: 8081

spring:
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# sa-token 配置
sa-token:
  token-name: sap-token
  timeout: 86400
  active-timeout: 3600
  is-concurrent: true
  token-style: uuid
  is-log: false

# 文件上传配置
file:
  upload:
    path: ./uploads/
    max-size: 52428800
    allowed-types: jpg,jpeg,png,gif,webp,md,pdf,doc,docx,xls,xlsx

# Knife4j 配置
# 安全默认：API 文档默认关闭，仅 dev 环境(application-dev.yml)显式开启，
# 避免 prod/docker 暴露接口结构给攻击者。
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
  info:
    title: 软件协会管理系统 API
    version: 1.0.0
    description: SAP Backend API Documentation
