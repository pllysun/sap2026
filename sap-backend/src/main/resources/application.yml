# ============================
# 公共配置
# ============================
# 切换环境：修改 spring.profiles.active 的值
#   dev  = 开发环境（本地数据库）
#   prod = 生产环境（腾讯云数据库）

server:
  port: 8081

spring:
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

# sa-token 配置
sa-token:
  token-name: sap-token
  # timeout：token 绝对有效期（秒）。Web/管理端走此默认值（86400=1天，到期重登，Redis 自动按 TTL 清理不膨胀）。
  #          App 登录(appLogin)单独 setTimeout(-1) 覆盖为永久——本地有凭证即永久免密。
  timeout: 86400
  # active-timeout：无操作冻结超时（秒）。-1=永不冻结。
  #   ⚠️ 原来是 3600(1小时)：App 放久不进就被冻结→/me 返 401→被迫重登（“放一晚上跳登录”的元凶）。
  #   改为 -1 后任何登录都不会因空闲被冻结；App 的永久免密不再依赖每-token覆盖，铁打不掉线。
  #   绝对有效期仍由上面的 timeout 控制（Web/管理端 1天，App 永久）。
  active-timeout: -1
  is-concurrent: true
  token-style: uuid
  is-log: false

# 文件上传配置
file:
  upload:
    path: ./uploads/
    max-size: 52428800
    allowed-types: jpg,jpeg,png,gif,webp,md,pdf,doc,docx,xls,xlsx

# Knife4j 配置
# 安全默认：API 文档默认关闭，仅 dev 环境(application-dev.yml)显式开启，
# 避免 prod/docker 暴露接口结构给攻击者。
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
  info:
    title: 软件协会管理系统 API
    version: 1.0.0
    description: SAP Backend API Documentation

# 教务(jw)模块配置：默认值对应中南林业，可按需覆盖
jw:
  # AES 密钥：用于加密存储学校教务密码。生产务必用环境变量 JW_AES_KEY 覆盖！
  aes-key: ${JW_AES_KEY:change-me-in-prod-please-32bytes!}
  session-ttl-minutes: 25

# 注：安卓 App 在线升级的版本元数据存数据库(Setting 表)，由管理端「App 版本发布」页维护，
# APK 走平台已配的腾讯云 COS，无需在此配置。
