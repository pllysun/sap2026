# ============================
# Docker 环境配置
# ============================
# 默认使用内置 H2 数据库 (MySQL 兼容模式)
# 可通过环境变量 MYSQL_URL / MYSQL_USER / MYSQL_PASSWORD 切换到外部 MySQL

spring:
  datasource:
    url: jdbc:h2:file:/app/data/sap;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  h2:
    console:
      enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 日志输出到 /app/logs
logging:
  file:
    path: /app/logs
